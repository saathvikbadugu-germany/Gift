<!DOCTYPE html>
<html>
<head>
<title>Operation Birthday Access</title>

<style>
body{
    background:black;
    color:#00ff00;
    font-family:Consolas,monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.box{
    border:2px solid #00ff00;
    padding:30px;
    max-width:700px;
    text-align:center;
}

button{
    background:black;
    color:#00ff00;
    border:2px solid #00ff00;
    padding:12px 25px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#00ff00;
    color:black;
}

input{
    padding:10px;
    font-size:16px;
    width:80%;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="box" id="screen">
<h2>OPERATION BIRTHDAY ACCESS</h2>
<p>Security Level: MAXIMUM</p>
<p>User: UNKNOWN</p>
<p>Complete all security checks.</p>

<br>
<button onclick="startMission()">START</button>
</div>

<script>

function celebration(){
for(let i=0;i<80;i++){
let c=document.createElement("div");
c.innerHTML=["🎉","✨","⭐","🔥"][Math.floor(Math.random()*4)];
c.style.position="fixed";
c.style.left=Math.random()*100+"vw";
c.style.top="-20px";
c.style.fontSize="24px";
c.style.zIndex="9999";
c.style.pointerEvents="none";
document.body.appendChild(c);

let pos=-20;
let fall=setInterval(()=>{
pos+=5;
c.style.top=pos+"px";
if(pos>window.innerHeight){
clearInterval(fall);
c.remove();
}
},20);
}
}

function accessDenied(){
document.getElementById("screen").innerHTML=`
<h1 style="color:red;">ACCESS DENIED</h1>
<p>Unauthorized attempt detected</p>
<button onclick="location.reload()">RETRY</button>
`;
}

function startMission(){
document.getElementById("screen").innerHTML=`
<h2>LOGIN</h2>
<p>Enter birthday</p>
<input id="password">
<br><br>
<button onclick="checkPassword()">LOGIN</button>
`;
}

function checkPassword(){
let pw=document.getElementById("password").value.trim();

if(pw==="19.12.2012"){
celebration();
showBase64();
}else{
accessDenied();
}
}

function showBase64(){
document.getElementById("screen").innerHTML=`
<h2>ENCRYPTED CODE</h2>
<p>QmlydGhkYXkgQWNjZXNzIENvZGU=</p>
<p>Decode it. What is second word?</p>
<input id="answer">
<br><br>
<button onclick="checkBase64()">SUBMIT</button>
`;
}

function checkBase64(){
let a=document.getElementById("answer").value.trim().toLowerCase();

if(a==="access"){
celebration();
showQR();
}else{
accessDenied();
}
}

function showQR(){
document.getElementById("screen").innerHTML=`
<h2>AUTH TOKEN</h2>
<p>Enter token</p>
<input id="token">
<br><br>
<button onclick="checkToken()">VERIFY</button>
`;
}

function checkToken(){
let t=document.getElementById("token").value.trim().toUpperCase();

if(t==="TOKEN-7429"){
celebration();
showNetwork();
}else{
accessDenied();
}
}

function showNetwork(){
document.getElementById("screen").innerHTML=`
<h2>NETWORK TEST</h2>
<p>Which IP is same subnet?</p>
<p>A) 192.168.11.23</p>
<p>B) 192.168.10.201</p>
<p>C) 10.0.0.55</p>
<p>D) 172.16.10.55</p>

<input id="net">
<br><br>
<button onclick="checkNetwork()">SUBMIT</button>
`;
}

function checkNetwork(){
let n=document.getElementById("net").value.trim().toUpperCase();

if(n==="B"){
celebration();
unlock();
}else{
accessDenied();
}
}

function unlock(){
document.getElementById("screen").innerHTML=`
<h2>DECRYPTING...</h2>
<p id="load">0%</p>
`;

let p=0;

let t=setInterval(()=>{
p++;
document.getElementById("load").innerText=p+"%";

if(p>=100){
clearInterval(t);
document.getElementById("screen").innerHTML=`
<h1>ACCESS GRANTED</h1>
<h2>🎉 HAPPY BIRTHDAY 🎉</h2>
<p>Gift is on your table</p>
`;
}
},40);
}

</script>

</body>
</html>
