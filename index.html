<!DOCTYPE html>
<html>
<head>
<title>Operation Birthday Access</title>

<style>
body{
    background: radial-gradient(circle at center, #050505, #000000);
    color:#00ff00;
    font-family:Consolas, monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    overflow:hidden;
}

/* glowing terminal box */
.box{
    border:2px solid #00ff00;
    padding:30px;
    max-width:750px;
    text-align:center;
    background:rgba(0,0,0,0.6);
    box-shadow:0 0 25px #00ff00;
    border-radius:10px;
    animation: flicker 3s infinite;
}

@keyframes flicker{
    0%,100%{box-shadow:0 0 15px #00ff00;}
    50%{box-shadow:0 0 35px #00ff00;}
}

button{
    background:black;
    color:#00ff00;
    border:2px solid #00ff00;
    padding:12px 25px;
    font-size:18px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#00ff00;
    color:black;
    transform:scale(1.05);
}

input{
    padding:10px;
    font-size:16px;
    width:80%;
    margin-top:10px;
    border:2px solid #00ff00;
    background:black;
    color:#00ff00;
}

/* subtle background scanlines */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background: repeating-linear-gradient(
        to bottom,
        rgba(0,255,0,0.03),
        rgba(0,255,0,0.03) 1px,
        transparent 2px,
        transparent 4px
    );
    pointer-events:none;
}
</style>
</head>

<body>

<div class="box" id="screen">

═══════════════════════════════

OPERATION BIRTHDAY ACCESS

SECURITY LEVEL: MAXIMUM

USER: UNKNOWN

A classified birthday file has been locked.

Complete all security checks to gain access.

<br><br>

<button onclick="startMission()">START</button>

</div>

<script>

function celebration(){
for(let i=0;i<80;i++){
let c=document.createElement("div");
c.innerHTML=["🎉","✨","⭐","🔥"][Math.floor(Math.random()*4)];
c.style.position="fixed";
c.style.left=Math.random()*100+"vw";
c.style.top="-20px";
c.style.fontSize="24px";
c.style.zIndex="9999";
c.style.pointerEvents="none";
document.body.appendChild(c);

let pos=-20;
let fall=setInterval(()=>{
pos+=5;
c.style.top=pos+"px";
if(pos>window.innerHeight){
clearInterval(fall);
c.remove();
}
},20);
}
}

function accessDenied(){
document.getElementById("screen").innerHTML=`
<h1 style="color:red;">⚠ ACCESS DENIED ⚠</h1>
<p>Unauthorized Access Attempt Detected</p>
<p>Logging Incident...</p>
<p>Reporting To Security Operations Center...</p>
<br>
<button onclick="location.reload()">RESTART AUTHENTICATION</button>
`;
}

function startMission(){
document.getElementById("screen").innerHTML=`
<h2>SECURE LOGIN</h2>
<p>Authentication Required</p>
<p>Hint: Your favorite child's birthday</p>

<input id="password">

<br><br>
<button onclick="checkPassword()">LOGIN</button>
`;
}

function checkPassword(){
let pw=document.getElementById("password").value.trim();

if(pw==="19.12.2012"){
celebration();
showBase64();
}else{
accessDenied();
}
}

function showBase64(){
document.getElementById("screen").innerHTML=`
<h2>ENCRYPTED TRANSMISSION</h2>
<p>QmlydGhkYXkgQWNjZXNzIENvZGU=</p>
<p><b>Hint:</b> Base64 Encoding</p>
<p>What is the SECOND word after decoding?</p>

<input id="answer">

<br><br>
<button onclick="checkBase64()">SUBMIT</button>
`;
}

function checkBase64(){
let answer=document.getElementById("answer").value.trim().toLowerCase();

if(answer==="access"){
celebration();
showQR();
}else{
accessDenied();
}
}

function showQR(){
document.getElementById("screen").innerHTML=`
<h2>MULTI-FACTOR AUTHENTICATION</h2>
<p>Enter the token:</p>

<input id="token">

<br><br>
<button onclick="checkToken()">VERIFY</button>
`;
}

function checkToken(){
let token=document.getElementById("token").value.trim().toUpperCase();

if(token==="TOKEN-7429" or token==="7429"){
celebration();
showNetworkPuzzle();
}else{
accessDenied();
}
}

function showNetworkPuzzle(){
document.getElementById("screen").innerHTML=`
<h2>NETWORK OPERATIONS</h2>
<p>A server has:</p>
<p><b>IP:</b> 192.168.10.55</p>
<p><b>Subnet Mask:</b> 255.255.255.0</p>

<p>Which address is on the SAME subnet?</p>

<p>A) 192.168.11.23</p>
<p>B) 192.168.10.201</p>
<p>C) 10.0.0.55</p>
<p>D) 172.16.10.55</p>

<input id="networkAnswer">

<br><br>
<button onclick="checkNetwork()">SUBMIT</button>
`;
}

function checkNetwork(){
let answer=document.getElementById("networkAnswer").value.trim().toUpperCase();

if(answer==="B"){
celebration();
unlockBirthdayFile();
}else{
accessDenied();
}
}

function unlockBirthdayFile(){
document.getElementById("screen").innerHTML=`
<h2>Decrypting Birthday File...</h2>
<p id="loading">0%</p>
`;

let progress=0;

let timer=setInterval(()=>{
progress++;
document.getElementById("loading").innerText=progress+"%";

if(progress>=100){
clearInterval(timer);

document.getElementById("screen").innerHTML=`
<h1>ACCESS GRANTED</h1>
<p>███████████████████ 100%</p>

<h2>🎉 HAPPY BIRTHDAY 🎉</h2>
<p>Mission Completed Successfully</p>
<p>Security Clearance: LEGENDARY</p>
<p>Family Status: APPROVED</p>
<p>Gift Location: on your table</p>
`;
}
},40);
}

</script>

</body>
</html>
